repo: gardusig/static-puzzles
dockerfile: docker/static-puzzles.dockerfile
jobs:
- id: lint
  name: Repo lint
  target: lint
- id: repo-hygiene
  name: Repo structure
  target: repo-hygiene
  needs: lint
  hygiene_policy:
    max_depth: 4
    allowed_root_dirs:
    - .github
    - docs
    - src
    - tests
    allowed_root_files:
    - README.md
    - games.yaml
    - tags.yaml
    allowed_extensions:
    - .css
    - .html
    - .js
    - .json
    - .jsx
    - .md
    - .yaml
    - .yml
    allowed_filenames:
    - .gitignore
    - LICENSE
    allowed_paths:
    - .github/pull-request.yaml
