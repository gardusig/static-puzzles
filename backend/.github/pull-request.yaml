repo: gardusig/static-puzzles-backend
jobs:
- id: lint
  name: Repo lint
  target: lint
- id: repo-hygiene
  name: Repo structure
  target: repo-hygiene
  needs: lint
  hygiene_policy:
    max_depth: 6
    allowed_root_dirs:
    - .github
    - .workflows
    - cmd
    - data
    - internal
    - scripts
    - test
    allowed_root_files:
    - .gitignore
    - Dockerfile
    - LICENSE
    - Makefile
    - README.md
    - go.mod
    - go.sum
    allowed_extensions:
    - .go
    - .md
    - .sh
    - .yaml
    - .yml
    - .sum
    - .mod
    allowed_filenames:
    - .gitignore
    - Dockerfile
    - LICENSE
    - Makefile
    allowed_paths:
    - .github/pull-request.yaml
