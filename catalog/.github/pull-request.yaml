repo: gardusig/static-puzzles-catalog
jobs:
- id: lint
  name: Repo lint
  target: lint
- id: repo-hygiene
  name: Repo structure
  target: repo-hygiene
  needs: lint
  hygiene_policy:
    max_depth: 6
    allowed_root_dirs:
    - .github
    - .workflows
    - scripts
    - src
    - test
    allowed_root_files:
    - .gitignore
    - Dockerfile
    - LICENSE
    - Makefile
    - README.md
    - games.yaml
    - tags.yaml
    allowed_extensions:
    - .md
    - .sh
    - .py
    - .yaml
    - .yml
    allowed_filenames:
    - .gitignore
    - Dockerfile
    - LICENSE
    - Makefile
    allowed_paths:
    - .github/pull-request.yaml
